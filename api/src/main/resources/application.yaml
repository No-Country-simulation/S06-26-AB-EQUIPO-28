spring:
  application:
    name: app-bit-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    allow-bean-definition-overriding: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        physical_naming_strategy: tech.nocountry.talent.appbitservice.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

  jackson:
    default-property-inclusion: non_null
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 32MB
      max-request-size: 32MB
      file-size-threshold: 0

  mvc:
    problemdetails:
      enabled: true

  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY:}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
      timeout: ${OPENROUTER_TIMEOUT:120s}
      chat:
        options:
          model: ${OPENROUTER_MODEL}

app:
  jwt:
    expiration: 86400000
    days: 7

server:
  compression:
    enabled: true
    mime-types: application/json,text/css,application/javascript
    min-response-size: 1024

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false

bucket4j:
  enabled: false

logging:
  level:
    root: INFO
    tech.nocountry.talent.appbitservice: DEBUG
